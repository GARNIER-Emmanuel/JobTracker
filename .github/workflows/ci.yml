name: JobTracker CI

# Événements déclencheurs du pipeline
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  # 1. Tâche pour les tests du Backend (Java Spring Boot)
  backend-tests:
    runs-on: ubuntu-latest
    # TODO : Indiquer à GitHub Actions de se placer dans le sous-dossier backend
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          # Optionnel : active le cache automatique des dépendances Maven
          cache: "maven"

      - name: Grant execute permission for mvnw
        # Sous Linux, les scripts doivent être rendus exécutables avant d'être lancés
        # TODO : Saisir la commande chmod pour le fichier mvnw
        run: chmod +x mvnw

      - name: Run Backend Tests
        # TODO : Lancer la commande de test Maven de Spring Boot
        run: ./mvnw clean test

  # 2. Tâche pour les tests du Frontend (Angular / Vitest)
  frontend-tests:
    runs-on: ubuntu-latest
    # TODO : Indiquer à GitHub Actions de se placer dans le sous-dossier front-jobtracker
    defaults:
      run:
        working-directory: front-jobtracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Optionnel : active le cache npm (nécessite d'indiquer le chemin du lockfile)
          cache: "npm"
          cache-dependency-path: front-jobtracker/package-lock.json

      - name: Install dependencies
        # TODO : Saisir la commande d'installation propre (Clean Install)
        run: npm ci

      - name: Run Frontend Tests
        # TODO : Exécuter la suite de tests en mode exécution unique (sans watch)
        run: npm run test -- --no-watch
